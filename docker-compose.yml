version: "3.9"

services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    labels:
      - "traefik.http.middlewares.upload-limit.buffering.maxRequestBodyBytes=20971520"
      - "traefik.http.middlewares.upload-limit.buffering.memRequestBodyBytes=20971520"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
